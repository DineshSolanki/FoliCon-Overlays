name: Generate Catalog

on:
  push:
    branches: [main]
    paths:
      - 'overlays/**'

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json
        run: |
          echo "Generating catalog from overlay manifests..."
          python3 - <<'PYEOF'
          import json, os, glob, hashlib
          from datetime import datetime, timezone

          def get_sha256(filepath):
              sha256_hash = hashlib.sha256()
              with open(filepath, "rb") as f:
                  for byte_block in iter(lambda: f.read(4096), b""):
                      sha256_hash.update(byte_block)
              return sha256_hash.hexdigest()

          overlays = []
          for manifest_path in sorted(glob.glob("overlays/*/manifest.json")):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              overlay_id = manifest["id"]
              base_url = f"https://raw.githubusercontent.com/${{ github.repository }}/main/overlays"
              overlay_dir = os.path.dirname(manifest_path)

              # Compute actual total size and verify/update hashes
              assets = manifest.get("assets", [])
              computed_size = 0
              manifest_hashes = manifest.get("sha256", {})
              manifest_changed = False

              for asset in assets:
                  asset_path = os.path.join(overlay_dir, asset)
                  if os.path.isfile(asset_path):
                      computed_size += os.path.getsize(asset_path)

                      # Calculate actual hash
                      actual_hash = get_sha256(asset_path)
                      expected_hash = manifest_hashes.get(asset)

                      if actual_hash != expected_hash:
                          print(f"  [FIX] Hash mismatch for {overlay_id}/{asset}: expected {expected_hash}, got {actual_hash}")
                          manifest_hashes[asset] = actual_hash
                          manifest_changed = True

              if manifest_changed:
                  manifest["sha256"] = manifest_hashes
                  manifest["sizeBytes"] = computed_size
                  manifest["updatedAt"] = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
                  with open(manifest_path, "w") as f:
                      json.dump(manifest, f, indent=2)
                      f.write("\n")
                  print(f"  Updated manifest.json for {overlay_id}")

              entry = {
                  "id": overlay_id,
                  "displayName": manifest.get("displayName", overlay_id),
                  "author": manifest.get("author", "Unknown"),
                  "description": manifest.get("description", ""),
                  "overlayVersion": manifest.get("overlayVersion", "1.0.0"),
                  "tags": manifest.get("tags", []),
                  "previewUrl": f"{base_url}/{overlay_id}/{manifest.get('previewImage', 'preview.png')}",
                  "overlayBaseUrl": base_url,
                  "overlayPath": overlay_id,
                  "sizeBytes": computed_size,
                  "sha256": manifest_hashes.get("overlay.json", ""),
                  "createdAt": manifest.get("createdAt", ""),
                  "updatedAt": manifest.get("updatedAt", "")
              }
              overlays.append(entry)

          catalog = {
              "schemaVersion": 1,
              "generatedAt": datetime.now(timezone.utc).isoformat(),
              "overlays": overlays
          }

          with open("catalog.json", "w") as f:
              json.dump(catalog, f, indent=2)
              f.write("\n")

          print(f"Generated catalog with {len(overlays)} overlays")
          PYEOF

      - name: Commit catalog and updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json overlays/*/manifest.json
          git diff --staged --quiet || git commit -m "chore: update catalog.json and manifests [skip ci]"
          git push
